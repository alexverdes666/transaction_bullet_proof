<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Mock Swap dApp — Honeypot Sandbox</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 640px; margin: 40px auto; padding: 0 16px; background:#0d1117; color:#e6edf3; }
    h1 { font-size: 20px; }
    button { font-size: 15px; padding: 10px 18px; margin: 6px 8px 6px 0; border-radius: 8px; border: 1px solid #30363d; background:#21262d; color:#e6edf3; cursor: pointer; }
    button:disabled { opacity: .4; cursor: not-allowed; }
    button:hover:not(:disabled) { background:#30363d; }
    pre { background:#161b22; padding:12px; border-radius:8px; overflow:auto; font-size:12px; }
    .ok { color:#3fb950; } .err { color:#f85149; } .muted { color:#8b949e; }
    code { color:#79c0ff; }
  </style>
</head>
<body>
  <h1>🍯 Mock Swap dApp <span class="muted">(local fork)</span></h1>
  <p class="muted">A minimal dApp frontend the sandbox drives to exercise the Approve → Swap workflow against an Anvil fork.</p>

  <div>
    <button id="connect">Connect Wallet</button>
    <button id="approve" disabled>Approve</button>
    <button id="swap" disabled>Swap (buy)</button>
  </div>

  <pre id="status">idle</pre>
  <pre id="cfg" class="muted"></pre>

<script>
// --- Config: from URL query (?rpc=&account=&router=&weth=&token=) ------------
const Q = new URLSearchParams(location.search);
const CFG = {
  rpc:     Q.get('rpc')     || 'http://127.0.0.1:8545',
  account: (Q.get('account')|| '').toLowerCase(),
  router:  (Q.get('router') || '').toLowerCase(),
  weth:    (Q.get('weth')   || '').toLowerCase(),
  token:   (Q.get('token')  || '').toLowerCase(),
  buyWei:  Q.get('buyWei')  || '0xde0b6b3a7640000', // 1 ETH default
};
document.getElementById('cfg').textContent = JSON.stringify(CFG, null, 2);

const $ = (id) => document.getElementById(id);
const log = (msg, cls) => { const el=$('status'); el.className = cls||''; el.textContent = msg; };
// Signal automation via DOM attributes. The DOM is shared across browser JS
// "worlds", whereas window globals are NOT reliably visible to the automation
// driver (esp. Firefox/Camoufox) — so DOM is the robust cross-world channel.
const signal = (k, v) => { document.documentElement.setAttribute('data-bp-' + k, String(v)); };

// --- Provider selection ------------------------------------------------------
// Prefer an injected EIP-1193 provider (window.ethereum) — that's what the
// Camoufox layer installs to mimic MetaMask. Fall back to a direct JSON-RPC
// shim so this page is also usable in a plain browser for manual testing.
function makeProvider() {
  if (window.ethereum && typeof window.ethereum.request === 'function') {
    log('using injected EIP-1193 provider (window.ethereum)', 'ok');
    signal('provider', window.ethereum.isMetaMask ? 'injected-metamask' : 'injected');
    return window.ethereum;
  }
  log('no injected provider — using direct JSON-RPC fallback', 'muted');
  signal('provider', 'fallback');
  let id = 0;
  return {
    request: async ({ method, params }) => {
      if (method === 'eth_accounts' || method === 'eth_requestAccounts') return [CFG.account];
      if (method === 'eth_chainId') {
        const r = await rpc('eth_chainId', []); return r;
      }
      return rpc(method, params || []);
    },
  };
  async function rpc(method, params) {
    const res = await fetch(CFG.rpc, {
      method: 'POST', headers: { 'content-type': 'application/json' },
      body: JSON.stringify({ jsonrpc:'2.0', id:++id, method, params }),
    });
    const j = await res.json();
    if (j.error) throw new Error(j.error.message);
    return j.result;
  }
}
const provider = makeProvider();

// --- Tiny ABI helpers (no library, no keccak needed: selectors are constants) -
const SEL = {
  approve: '0x095ea7b3',
  balanceOf: '0x70a08231',
  swapExactETHForTokensSupportingFeeOnTransferTokens: '0xb6f9de95',
};
const pad = (hexNo0x) => hexNo0x.padStart(64, '0');
const addrWord = (a) => pad(a.replace(/^0x/, '').toLowerCase());
const uintWord = (v) => pad(BigInt(v).toString(16));

// approve(spender, amount=MAX_UINT)
function encApprove(spender) {
  const MAX = (1n << 256n) - 1n;
  return SEL.approve + addrWord(spender) + uintWord(MAX);
}
// swapExactETHForTokensSupportingFeeOnTransferTokens(amountOutMin, path[weth,token], to, deadline)
function encSwapBuy(to, deadline) {
  const head =
    uintWord(0) +            // amountOutMin = 0 (sandbox accepts any output)
    uintWord(0x80) +         // offset to path array
    addrWord(to) +
    uintWord(deadline);
  const arr =
    uintWord(2) +            // path length
    addrWord(CFG.weth) +
    addrWord(CFG.token);
  return SEL.swapExactETHForTokensSupportingFeeOnTransferTokens + head + arr;
}

async function sendTx(tx) {
  return provider.request({ method: 'eth_sendTransaction', params: [tx] });
}
async function waitMined(hash) {
  // Anvil auto-mines; poll the receipt briefly.
  for (let i = 0; i < 50; i++) {
    const r = await provider.request({ method: 'eth_getTransactionReceipt', params: [hash] });
    if (r) return r;
    await new Promise((res) => setTimeout(res, 100));
  }
  return null;
}

// --- Workflow wiring ---------------------------------------------------------
let account = CFG.account;
const deadline = () => Math.floor(Date.now() / 1000) + 3600;

$('connect').onclick = async () => {
  try {
    const accts = await provider.request({ method: 'eth_requestAccounts' });
    account = (accts && accts[0] ? accts[0] : CFG.account).toLowerCase();
    signal('connected', '1');                     // DOM signal for the automation
    log('connected: ' + account, 'ok');
    $('approve').disabled = false;
    $('swap').disabled = false;
  } catch (e) { signal('error', 'connect:' + e.message); log('connect failed: ' + e.message, 'err'); }
};

$('approve').onclick = async () => {
  try {
    log('approving router...', 'muted');
    const hash = await sendTx({ from: account, to: CFG.token, data: encApprove(CFG.router) });
    const rec = await waitMined(hash);
    const ok = rec && rec.status !== '0x0';
    signal('approved', ok ? '1' : '0');
    log('approve ' + (ok ? 'OK' : 'REVERTED') + ' — ' + hash, ok ? 'ok' : 'err');
  } catch (e) { signal('approved', '0'); signal('error', 'approve:' + e.message); log('approve failed: ' + e.message, 'err'); }
};

$('swap').onclick = async () => {
  try {
    log('swapping (buy)...', 'muted');
    const hash = await sendTx({
      from: account, to: CFG.router, value: CFG.buyWei,
      data: encSwapBuy(account, deadline()),
    });
    const rec = await waitMined(hash);
    const ok = rec && rec.status !== '0x0';
    signal('swaptx', hash);
    signal('swapped', ok ? '1' : '0');
    log('swap ' + (ok ? 'OK' : 'REVERTED') + ' — ' + hash, ok ? 'ok' : 'err');
  } catch (e) { signal('swapped', '0'); signal('error', 'swap:' + e.message); log('swap failed: ' + e.message, 'err'); }
};
</script>
</body>
</html>
